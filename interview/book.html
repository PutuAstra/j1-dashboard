<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book an Interview — CTI ClaudeHire</title>
  <link rel="icon" type="image/png" href="cti-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f172a;
      --card:     #1e293b;
      --border:   #334155;
      --text:     #f1f5f9;
      --text-2:   #cbd5e1;
      --muted:    #94a3b8;
      --accent:   #B01A18;
      --green:    #16a34a;
      --red:      #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar img { height: 36px; width: auto; }
    .topbar-title { font-size: 13px; font-weight: 700; line-height: 1.25; }
    .topbar-sub   { font-size: 11px; color: var(--muted); font-weight: 400; }

    .page { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(176,26,24,0.15);
      color: #f87171;
    }

    /* Day section */
    .day-section { margin-bottom: 20px; }
    .day-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .slot-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .slot-btn:hover:not(.booked) { border-color: var(--accent); color: var(--text); background: rgba(176,26,24,0.08); }
    .slot-btn.selected { border-color: var(--accent); background: rgba(176,26,24,0.18); color: #fff; }
    .slot-btn.booked {
      opacity: 0.38;
      cursor: not-allowed;
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Form */
    .form-section { margin-top: 24px; display: none; }
    .form-section.visible { display: block; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
    input[type=text], input[type=email] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    .selected-slot-box {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text-2); }
    .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }

    /* Confirmation */
    .confirm-box {
      text-align: center;
      padding: 40px 20px;
    }
    .confirm-icon { font-size: 56px; margin-bottom: 16px; }
    .confirm-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .confirm-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .error-box span { font-size: 40px; display: block; margin-bottom: 16px; }

    @media (max-width: 480px) {
      .slots-grid { grid-template-columns: repeat(3, 1fr); }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <img src="cti-logo.png" alt="CTI" />
  <div>
    <div class="topbar-title">CTI Group Worldwide Services, Inc.</div>
    <div class="topbar-sub">ClaudeHire — Interview Booking</div>
  </div>
</div>

<div class="page">
  <div id="root"><div class="spinner"></div></div>
</div>

<script>
const WORKER_URL = 'https://interview-api.putuastrawijaya.workers.dev';

const token = new URLSearchParams(window.location.search).get('t');

let _selectedSlot = null;
let _linkInfo     = null;

// ── Init ──────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', () => {
  if (!token) return renderError('Invalid booking link. No token provided.');
  loadSlots();
});

async function loadSlots() {
  const root = document.getElementById('root');
  root.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await apiFetch('GET', `/api/booking/slots/${token}`);
    _linkInfo = data;
    renderSlotPicker(data);
  } catch (e) {
    renderError(e.message);
  }
}

// ── Slot picker ───────────────────────────────────────────────

function renderSlotPicker(data) {
  const root = document.getElementById('root');

  // Group slots by local date
  const groups = {};
  (data.slots || []).forEach(s => {
    const d = new Date(s.start);
    const key = d.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  const hasSlots = Object.keys(groups).length > 0;

  root.innerHTML = `
    <div style="margin-bottom:28px">
      <h1>${esc(data.title)}</h1>
      ${data.clientName || data.position ? `
        <div class="subtitle" style="margin-top:6px">
          ${data.clientName ? esc(data.clientName) : ''}${data.clientName && data.position ? ' · ' : ''}${data.position ? esc(data.position) : ''}
        </div>` : ''}
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <span class="badge" style="background:rgba(98,100,167,0.2);color:#9ea0cc">🟦 Microsoft Teams</span>
        <span class="badge" style="background:rgba(99,102,241,0.15);color:#a5b4fc">${data.duration} minutes</span>
      </div>
    </div>

    ${!hasSlots ? `
      <div class="card">
        <div class="error-box">
          <span>📅</span>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">No availability right now</div>
          <div>There are no open slots at this time. Please check back later or contact CTI directly.</div>
        </div>
      </div>
    ` : `
      <div class="card">
        <h2>Pick a time</h2>
        <p class="subtitle" style="margin-bottom:16px">All times shown in your local timezone (${Intl.DateTimeFormat().resolvedOptions().timeZone})</p>
        ${Object.entries(groups).map(([dateLabel, slots]) => `
          <div class="day-section">
            <div class="day-label">${dateLabel}</div>
            <div class="slots-grid">
              ${slots.map(s => {
                const timeStr = new Date(s.start).toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
                if (s.booked) {
                  return `<button class="slot-btn booked" disabled title="This slot is already taken">${timeStr}</button>`;
                }
                return `<button class="slot-btn" data-start="${s.start}" data-end="${s.end}" onclick="selectSlot(${s.start},${s.end},this)">${timeStr}</button>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      <div class="card form-section" id="booking-form" style="margin-top:16px">
        <h2>Your Details</h2>
        <div id="selected-slot-display" class="selected-slot-box" style="color:var(--accent)"></div>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="cand-name" placeholder="Your full name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="cand-email" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" id="confirm-btn" onclick="submitBooking()">Confirm Booking</button>
          <button class="btn btn-outline" onclick="clearSlot()">Choose Different Time</button>
        </div>
      </div>
    `}
  `;
}

function selectSlot(start, end, btn) {
  _selectedSlot = { start, end };
  // Deselect all
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // Show form
  const form = document.getElementById('booking-form');
  form.classList.add('visible');
  // Update selected slot display
  const d = new Date(start);
  const dateStr = d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const timeStr = d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  const endStr  = new Date(end).toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  document.getElementById('selected-slot-display').textContent = `📅 ${dateStr} · ${timeStr} – ${endStr}`;
  // Scroll to form
  form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('cand-name').focus();
}

function clearSlot() {
  _selectedSlot = null;
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  const form = document.getElementById('booking-form');
  form.classList.remove('visible');
}

// ── Submit booking ────────────────────────────────────────────

async function submitBooking() {
  const name  = document.getElementById('cand-name').value.trim();
  const email = document.getElementById('cand-email').value.trim();
  if (!name)  return alert('Please enter your name.');
  if (!email || !email.includes('@')) return alert('Please enter a valid email address.');
  if (!_selectedSlot) return alert('Please select a time slot.');

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Confirming…';

  try {
    const result = await apiFetch('POST', `/api/booking/book/${token}`, {
      candidateName:  name,
      candidateEmail: email,
      slotStart:      _selectedSlot.start,
      candidateTz:    Intl.DateTimeFormat().resolvedOptions().timeZone,
    });
    renderConfirmation(name, email, _selectedSlot, result);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Confirm Booking';
    if (e.status === 409) {
      // Slot was taken — reload slots
      alert('Sorry, that slot was just booked by someone else. Reloading available times…');
      loadSlots();
    } else {
      alert('Booking failed: ' + e.message);
    }
  }
}

function renderConfirmation(name, email, slot, result) {
  const root = document.getElementById('root');
  const d = new Date(slot.start);
  const dateStr = d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const timeStr = d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  const endStr  = new Date(slot.end).toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });

  root.innerHTML = `
    <div class="card">
      <div class="confirm-box">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title">You're all set, ${esc(name)}!</div>
        <div class="confirm-sub" style="margin-top:16px">
          <strong style="color:var(--text)">${esc(_linkInfo?.title || 'Interview')}</strong><br/>
          ${dateStr}<br/>
          ${timeStr} – ${endStr}
        </div>
        <div class="confirm-sub" style="margin-top:12px">
          A confirmation has been sent to <strong style="color:var(--text)">${esc(email)}</strong>.
        </div>
      </div>
    </div>
  `;
}

// ── Error ─────────────────────────────────────────────────────

function renderError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="error-box">
      <span>⚠️</span>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Link Unavailable</div>
      <div>${esc(msg)}</div>
    </div>
  `;
}

// ── API ───────────────────────────────────────────────────────

async function apiFetch(method, path, body) {
  const res = await fetch(WORKER_URL + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({ error: 'Server error' }));
  if (!res.ok) {
    const err = new Error(data.error || 'Request failed');
    err.status = res.status;
    throw err;
  }
  return data;
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
