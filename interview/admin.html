<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTI ClaudeHire — Admin</title>
  <link rel="icon" type="image/png" href="cti-logo.png" />
  <link rel="apple-touch-icon" href="cti-logo.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#B01A18" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20250522d" />
</head>
<body>

<!-- Login Gate -->
<div id="login-gate">
  <div class="login-box card">
    <div class="login-logo" style="text-align:center;margin-bottom:28px">
      <img src="cti-logo.png" alt="CTI Group" style="height:80px;width:auto;display:block;margin:0 auto 12px" />
      <div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.3">CTI Group Worldwide Services, Inc.</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">ClaudeHire Admin Portal</div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="key-input" placeholder="Enter your password" autocomplete="off" />
    </div>
    <div style="text-align:center">
      <button class="btn btn-primary btn-lg" onclick="doLogin()">Log In</button>
    </div>
    <p id="login-err" class="text-sm" style="color:var(--red);margin-top:10px;display:none">Incorrect key. Try again.</p>
  </div>
</div>

<!-- Main App (hidden until login) -->
<div id="app" style="display:none">

  <div class="topbar">
    <div class="topbar-brand" style="gap:12px">
      <img src="cti-logo.png" alt="CTI" style="height:40px;width:auto;flex-shrink:0" />
      <div style="display:flex;flex-direction:column;line-height:1.25">
        <span style="font-size:13px;font-weight:700">CTI Group Worldwide Services, Inc.</span>
        <span style="font-size:11px;color:var(--muted);font-weight:400">ClaudeHire Admin Portal</span>
      </div>
    </div>
    <div class="flex gap-8">
      <span id="topbar-info" class="text-muted text-sm"></span>
      <button class="btn btn-ghost" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="page-wide">

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('interviews')">Interviews</button>
      <button class="tab-btn" onclick="switchTab('create')">+ New Interview</button>
    </div>

    <!-- Tab: Interviews List -->
    <div class="tab-pane active" id="tab-interviews">
      <div class="flex justify-between items-center" style="margin-top:8px;margin-bottom:20px">
        <h2>All Interviews</h2>
        <button class="btn btn-outline" onclick="loadInterviews()">↻ Refresh</button>
      </div>
      <div class="flex gap-8 mb-16">
        <input type="text" id="search-interviews" placeholder="Search by name…"
          oninput="filterAndRenderInterviews()"
          style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px" />
        <select id="sort-interviews" onchange="filterAndRenderInterviews()"
          style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;cursor:pointer">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="candidates">Most Candidates</option>
        </select>
      </div>
      <div id="interviews-list"></div>
    </div>

    <!-- Tab: Create Interview -->
    <div class="tab-pane" id="tab-create">
      <div class="card">
        <h2 class="mb-16">Create New Interview</h2>

        <div class="form-group">
          <label>Interview Title *</label>
          <input type="text" id="new-title" placeholder="e.g. J1 Intern Initial Screening" />
        </div>

        <div class="form-group">
          <label>Description (shown to candidate)</label>
          <textarea id="new-desc" placeholder="Brief instructions for the candidate..."></textarea>
        </div>

        <hr class="divider" />

        <div class="flex justify-between items-center mb-16">
          <h3>Questions</h3>
          <button class="btn btn-outline" onclick="addQuestion()">+ Add Question</button>
        </div>

        <div id="questions-builder"></div>

        <div class="mt-24 flex gap-8">
          <button class="btn btn-primary" onclick="submitInterview()">Create Interview</button>
          <button class="btn btn-outline" onclick="resetCreateForm()">Clear</button>
        </div>
      </div>
    </div>

  </div><!-- /page-wide -->
</div><!-- /app -->

<!-- Modal: Edit Interview -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2>Edit Interview</h2>
      <button class="btn btn-ghost" onclick="closeModal('modal-edit')">✕</button>
    </div>

    <div class="form-group">
      <label>Interview Title *</label>
      <input type="text" id="edit-title" placeholder="e.g. J1 Intern Initial Screening" />
    </div>

    <div class="form-group">
      <label>Description (shown to candidate)</label>
      <textarea id="edit-desc" placeholder="Brief instructions for the candidate..."></textarea>
    </div>

    <hr class="divider" />

    <div class="flex justify-between items-center mb-16">
      <h3>Questions</h3>
      <button class="btn btn-outline" onclick="addEditQuestion()">+ Add Question</button>
    </div>

    <div id="edit-questions-builder"></div>

    <div class="mt-24 flex gap-8">
      <button class="btn btn-primary" onclick="submitEditInterview()">Save Changes</button>
      <button class="btn btn-outline" onclick="closeModal('modal-edit')">Cancel</button>
    </div>
  </div>
</div>

<!-- Modal: Sessions -->
<div class="modal-overlay" id="modal-sessions">
  <div class="modal" style="max-width:900px;width:90vw">
    <div class="modal-header">
      <h2 id="modal-interview-title">Interview</h2>
      <button class="btn btn-ghost" onclick="closeModal('modal-sessions')">✕</button>
    </div>

    <!-- Invite pane -->
    <div id="session-pane-invite" style="display:none">
      <h3 class="mb-16">Invite</h3>
      <div class="mb-16 flex gap-8 items-center">
        <input type="text" id="new-cand-name" placeholder="Candidate name *" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px" />
        <input type="email" id="new-cand-email" placeholder="Email *" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px" />
        <button class="btn btn-primary" onclick="generateLink()">Generate Link</button>
      </div>

      <div id="generated-link-box" style="display:none">
        <p class="text-sm text-muted mb-4">Share this link with the candidate:</p>
        <div class="link-box">
          <span id="generated-link-text" style="flex:1"></span>
          <button class="btn btn-ghost" style="padding:2px 8px;font-size:11px;flex-shrink:0" onclick="copyLink()">Copy</button>
        </div>
        <div class="mt-8" style="text-align:right">
          <button id="send-email-btn" class="btn btn-primary" style="display:none">✉ Send Email</button>
        </div>
      </div>
    </div>

    <!-- Candidates pane -->
    <div id="session-pane-candidates" style="display:none">
      <h3 class="mb-16" id="sessions-heading">Candidates</h3>
      <div id="sessions-list"></div>
    </div>
  </div>
</div>

<!-- Modal: Review Videos -->
<div class="modal-overlay" id="modal-review">
  <div class="modal" style="max-width:860px">
    <div class="modal-header">
      <div>
        <h2 id="review-candidate-name">Review</h2>
        <p id="review-interview-title" class="text-muted text-sm"></p>
      </div>
      <button class="btn btn-ghost" onclick="closeModal('modal-review')">✕</button>
    </div>
    <div id="review-content"></div>
  </div>
</div>

<div id="toast"></div>

<script src="admin.js?v=20250522d"></script>
</body>
</html>
